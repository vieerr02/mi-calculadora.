<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Ganancias Reales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h1>💰 Mi Calculadora de Metas</h1>
        <p>Calcula cuánto necesitas ingresar para cubrir tus gastos y ganar lo que deseas.</p>
        
        <label for="meta">¿Cuánto quieres ganar libre al mes?</label>
        <input type="number" id="meta" placeholder="Ej: 3000">
        
        <label for="gastos">¿Cuánto gastas al mes (materiales, luz, etc.)?</label>
        <input type="number" id="gastos" placeholder="Ej: 600">
        
        <button id="botonCalcular">Calcular Objetivo Diario</button>
        
        <h2 id="resultado"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
